<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doctor Portal - Dashboard</title>
  <link rel="stylesheet" href="../site/css/Doctor.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <img src="../static/imgs/logo.png" alt="Logo" class="sidebar-logo">
        <button class="sidebar-btn">Appointments</button>
      </div>
      <div class="sidebar-bottom">
        <div class="doctor-info">
          <strong>Dr. Sarah Ali</strong>
          <small>sarah.ali@brainic.com</small>
        </div>
        <button class="logout-btn">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar">
        <h2>Manage Appointments</h2>
        <input type="text" placeholder="Search..." class="search-bar">
      </div>

      <div id="doctorAppointments">Loading appointments...</div>
    </main>
  </div>

  <script>
    // ✅ Fetch all appointments for doctor view
    fetch("http://localhost:3000/doctorAppointments")
      .then(res => res.json())
      .then(data => {
        const listDiv = document.getElementById("doctorAppointments");
        listDiv.innerHTML = "";

        if (data.length === 0) {
          listDiv.innerHTML = "<p>No appointments yet.</p>";
        } else {
          data.forEach((appt, index) => {
            const date = new Date(appt.appointment_date).toDateString();
            listDiv.innerHTML += `
              <div class="appointment-card">
                <strong>Email:</strong> ${appt.email}<br>
                <strong>Contact:</strong> ${appt.contact}<br>
                <strong>Date:</strong> ${date}<br>
                <strong>Scan:</strong> <a href="${appt.scan_path}" target="_blank">View</a><br>
                <hr/>
              </div>
            `;
          });
        }
      })
      .catch(err => {
        console.error("❌ Error fetching doctor appointments:", err);
        document.getElementById("doctorAppointments").innerHTML = "<p>Error loading appointments.</p>";
      });
  </script>
</body>
</html>
